  <div
        class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-xl group font-sans hover:-translate-y-2 transition delay-100 ease-in-out transform duration-200">
        <div class="relative overflow-hidden mb-4">
          <img [src]="product().imageCover"
               [alt]="product().title" 
            class="w-full h-auto object-contain rounded-2xl" />

          <!--  ! ----------- Icons  Heart ! ----------- ....  -->
          <div class="absolute top-2 right-2 flex flex-col gap-2">
            <button
              class="w-10 h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-red-100 hover:text-red-600 transition-all cursor-pointer">
              <i class="fa-solid fa-heart"></i>
            </button>

            <button
              class="w-10 h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-green-500 hover:text-white transition-all cursor-pointer">
              <i class="fas fa-sync-alt"></i>
            </button>

            <button
              [routerLink]="['/product-details' , product()._id , product().slug]"
              class="w-10 cursor-pointer h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-green-500 hover:text-white transition-all ">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="space-y-1">
          <p class="text-xs text-gray-400 tracking-wide"> {{product().category.name}} </p>

          <h3 class="text-lg font-medium text-slate-800 hover:text-emerald-600 cursor-pointer transition-colors">
            {{product().title}}
          </h3>

          <div class="flex items-center gap-1">
            <div class="flex text-yellow-400 text-xs gap-0.5">
              <i class="fas fa-star"></i>
              <i class="fas fa-star"></i>
              <i class="fas fa-star"></i>
              <i class="fas fa-star"></i>
              <i class="far fa-star text-gray-300"></i>
            </div>
            <span class="text-xs text-gray-400 font-medium">
              {{product().ratingsAverage}} ( {{product().ratingsQuantity}} )</span>
          </div>

          <div class="flex items-center justify-between pt-2">
            <div class="flex flex-col">
              <span class="text-lg font-medium text-slate-900"> {{product().price}} EGP</span>
            </div>

            <button
              (click)="addToCart(product().id)"
              class="w-10 h-10 cursor-pointer bg-green-500 text-white rounded-lg flex items-center justify-center hover:bg-green-600 transition-colors shadow-sm active:scale-95">
              <i class="fas fa-plus"></i>
            </button>
          </div>
        </div>
  </div>
