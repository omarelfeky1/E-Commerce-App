 <nav class="sticky top-0 z-40 w-full border-b border-gray-100 bg-white px-6 py-4 font-sans">

     </a>

     <!-- input search  -->

         <input type="text" placeholder="Search for products..."

         </button>
       </div>
     </div>

     <!-- !---------------------------- links  !---------------------------- -->

       <a routerLink="/shop" routerLinkActive="text-green-500"
         class="font-medium text-gray-700 transition-colors hover:text-green-500">Shop</a>
       <div class="group relative">
         <button

         </button>

           <ul class="py-2 text-sm text-gray-700">
             <li>
               <a routerLink="/categories" routerLinkActive="text-green-500"
                 class="block px-4 py-2 hover:bg-green-50 hover:text-green-500">All Categories</a>
             </li>
             <li>
               <a routerLink="/not-found" routerLinkActive="text-green-500" class="block px-4 py-2 hover:bg-green-50 hover:text-green-500">Electronics</a>
             </li>
             <li>
               <a routerLink="/not-found" routerLinkActive="text-green-500" class="block px-4 py-2 hover:bg-green-50 hover:text-green-500">Women's Fashion</a>
             </li>
             <li>
               <a routerLink="/not-found" routerLinkActive="text-green-500" class="block px-4 py-2 hover:bg-green-50 hover:text-green-500">Men's Fashion</a>
             </li>
             <li>
               <a routerLink="/not-found" routerLinkActive="text-green-500" class="block px-4 py-2 hover:bg-green-50 hover:text-green-500">Beauty & Health</a>
             </li>
           </ul>
         </div>
       </div>
       <a routerLink="/brands" routerLinkActive="text-green-500" class="font-medium text-gray-700 transition-colors hover:text-green-500">Brands</a>
     </div>

     <!-- ? --------------- ICONS  & signin ? ---------------  -->
     <div class="flex items-center gap-2 md:gap-4">
       <button
         class="flex h-10 w-10 items-center justify-center rounded-full text-gray-600 transition-all hover:bg-gray-100 lg:hidden">
         <i class="fas fa-search text-lg"></i>
       </button>
       <button routerLink="/wishlist" routerLinkActive="text-green-500"
         class="relative flex h-10 w-10 items-center justify-center rounded-full text-gray-600 transition-all hover:bg-gray-100 hover:text-red-500 cursor-pointer">
         <i class="fa-solid fa-heart text-xl"></i>
       </button>

       <button routerLink="/cart" routerLinkActive="text-green-500"
         class="relative flex h-10 w-10 items-center justify-center rounded-full text-gray-600 transition-all hover:bg-gray-100 hover:text-green-500 cursor-pointer">
         <i class="fas fa-shopping-cart text-xl"></i>
         <span
           class="absolute right-1 top-1 rounded-full border-2 border-white bg-green-500 px-1.5 text-2xs font-bold text-white">{{count()}}</span>
       </button>

       <div class="hidden sm:flex items-center gap-4 pl-2 md:border-l md:border-gray-200 md:pl-4">
         @if (logged()) {
         <!-- signout -->
         <button 
            (click)="logOut()"
           class="flex items-center gap-2 font-medium text-white transition-colors cursor-pointer hover:bg-transparent hover:text-danger bg-green-500 py-2 px-4 rounded-4xl">
            Sign Out
         </button>
         }
         @else {
         <!-- login,register -->
         <a routerLink="/login" 
           class="flex items-center gap-2 font-semibold text-white transition-colors hover:bg-green-600 bg-green-500 py-2 px-4 rounded-4xl">
           <i class="far fa-user text-lg"></i> Sign In
         </a>
         <a routerLink="/register" 
           class="flex items-center gap-2 font-semibold text-green-500 transition-colors">
           <i class="fas fa-user-plus text-lg"></i> Sign Up
         </a>
         }
       </div>

       <!-- dropdown when login -->

       <!-- bars button  -->
       <button type="button" data-drawer-target="drawer-right" data-drawer-show="drawer-right"
         data-drawer-placement="right"
         class="p-2 text-gray-600 hover:text-green-500 md:hidden focus:outline-none transition-colors">
         <i class="fas fa-bars text-2xl"></i>
       </button>
     </div>
