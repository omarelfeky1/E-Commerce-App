<section class="bg-linear-to-br from-green-600 to-green-300 text-white py-16 px-10">
<p class="text-sm opacity-80 mb-2"> <a routerLink="/home" class="text-gray-300 font-semibold hover:text-white mr-2">Home</a>  /  <a class="font-semibold ml-2">Brands</a>  /  <a class="font-semibold ml-2"></a></p>
    <div
      class="flex items-center gap-4 pt-3">
      <div class="flex items-center justify-center w-14 h-14 rounded-2xl bg-gr text-white text-4xl mask-b-from-fg-danger-strong">
        <img [src]="specificBrand().image">
      </div>
      <div>
        <h3 class="font-bold text-white text-4xl mb-2">{{specificBrand().name}}</h3>
        <p class="text-white opacity-90">Shop {{specificBrand().name}} Products</p>
      </div>
    </div>
</section>

<section class="max-w-7xl mx-auto px-4 py-10">

    <div class="flex items-center gap-3 flex-wrap" >
        <i class="fa-solid fa-filter"></i>
        <span class="text-gray-700 font-medium"> Active Filters: </span>
        <div class="flex items-center gap-2 bg-purple-100 text-purple-600 px-3 py-1 rounded-full">
          <i class="fa-solid fa-tags text-sm"></i>
          <span class="text-sm font-medium">{{specificBrand().name}}</span>
          <i class="fa-solid fa-xmark text-sm"></i>
        </div>

        <a routerLink="/shop" class="underline hover:text-purple-600">Clear All</a>
    </div>

    <div class="container grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6 ">
      <p>Showing </p>
    </div>
</section>
